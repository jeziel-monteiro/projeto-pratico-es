services:
  postgres:
    image: postgres:16-alpine
    container_name: porto-certo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: porto_certo_dev
      POSTGRES_USER: porto_certo
      POSTGRES_PASSWORD: porto_certo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porto_certo -d porto_certo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
